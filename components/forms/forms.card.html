<!-- @dsCard group="Forms" viewport="700x420" name="Form controls" subtitle="Select · Input · Segmented · Switch · Radio · Checkbox · Textarea" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--dt-paper); padding: 28px; font-family: var(--dt-font-sans); color: var(--dt-ink); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 30px; align-items: start; }
  .stack { display: grid; gap: 18px; align-content: start; }
  .lab { font-size: 13px; font-weight: 600; color: var(--dt-muted-strong); margin-bottom: 7px; display: block; }
  .field { background: var(--dt-surface-sunken); border-radius: var(--dt-radius-md); padding: 11px 13px; font-size: 14px; color: var(--dt-ink-strong); display: flex; align-items: center; justify-content: space-between; }
  .field.mono { font-family: var(--dt-font-mono); font-size: 13px; }
  .field svg { color: var(--dt-muted); }
  textarea.field { width: 100%; box-sizing: border-box; resize: none; font-family: var(--dt-font-mono); font-size: 13px; line-height: 1.55; }
  /* segmented */
  .seg { display: inline-flex; padding: 3px; gap: 2px; background: var(--dt-surface-sunken); border-radius: var(--dt-radius-md); }
  .seg b { padding: 7px 16px; border-radius: var(--dt-radius-sm); font-size: 13px; font-weight: 600; color: var(--dt-muted); cursor: pointer; }
  .seg b.on { background: var(--dt-surface); color: var(--dt-ink-strong); box-shadow: var(--dt-ring), var(--dt-shadow-xs); }
  /* switch */
  .row { display: flex; align-items: center; gap: 10px; }
  .row > .otext { white-space: nowrap; }
  .sw { width: 38px; height: 22px; border-radius: 9999px; background: var(--dt-accent); padding: 2px; display: inline-flex; justify-content: flex-end; }
  .sw i { width: 18px; height: 18px; border-radius: 9999px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
  /* radio + checkbox */
  .opt { display: flex; align-items: flex-start; gap: 10px; }
  .radio { width: 18px; height: 18px; border-radius: 9999px; border: 1.5px solid var(--dt-accent); display: grid; place-items: center; flex: 0 0 auto; margin-top: 1px; }
  .radio i { width: 9px; height: 9px; border-radius: 9999px; background: var(--dt-accent); }
  .radio.off { border-color: var(--dt-border-strong); }
  .box { width: 18px; height: 18px; border-radius: 5px; background: var(--dt-accent); display: grid; place-items: center; flex: 0 0 auto; }
  .box.off { background: var(--dt-surface); border: 1.5px solid var(--dt-border-strong); }
  .otext { font-size: 14px; color: var(--dt-ink); line-height: 1.3; }
  .ohint { font-size: 12px; color: var(--dt-muted); }
  .opt > span:last-child { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stack">
    <div>
      <span class="lab">기관</span>
      <div class="field">기상청<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div>
      <span class="lab">베이스 URL</span>
      <div class="field mono">https://api.datari.kr</div>
    </div>
    <div>
      <span class="lab">프로토콜</span>
      <div class="seg"><b>MCP</b><b class="on">REST</b></div>
    </div>
    <div class="row"><span class="sw"><i></i></span><span class="otext">실시간 동기화</span></div>
  </div>

  <div class="stack">
    <div>
      <span class="lab">요청 메서드</span>
      <div class="stack" style="gap:11px">
        <label class="opt"><span class="radio"><i></i></span><span><span class="otext">GET</span><div class="ohint">조회 전용</div></span></label>
        <label class="opt"><span class="radio off"></span><span><span class="otext">POST</span><div class="ohint">작업 생성</div></span></label>
      </div>
    </div>
    <label class="opt"><span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12l4.5 4.5L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="otext">승인된 도구만 노출</span></label>
    <label class="opt"><span class="box off"></span><span class="otext">베타 엔드포인트 포함</span></label>
    <div>
      <span class="lab">요청 파라미터</span>
      <textarea class="field" rows="3">{ "nx": 60, "ny": 127 }</textarea>
    </div>
  </div>
</div>
</body>
</html>
