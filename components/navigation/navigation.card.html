<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--dt-paper); padding: 26px; font-family: var(--dt-font-sans); color: var(--dt-ink); }
  .stack { display: grid; gap: 24px; }
  .crumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .crumb a { color: var(--dt-muted); text-decoration: none; font-weight: 500; }
  .crumb b { color: var(--dt-ink-strong); font-weight: 600; }
  .crumb svg { color: var(--dt-border-strong); }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--dt-divider); }
  .tab { padding: 10px 13px; margin-bottom: -1px; font-size: 13px; font-weight: 600; color: var(--dt-muted); border-bottom: 2px solid transparent; }
  .tab .c { font-family: var(--dt-font-mono); font-size: 11px; color: var(--dt-muted); margin-left: 6px; }
  .tab.on { color: var(--dt-ink-strong); border-bottom-color: var(--dt-accent); }
  .menu { width: 210px; padding: 5px; background: var(--dt-surface); border-radius: var(--dt-radius-md); box-shadow: var(--dt-shadow-lg); }
  .mi { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--dt-radius-sm); font-size: 13.5px; color: var(--dt-ink); }
  .mi.hov { background: var(--dt-surface-sunken); }
  .mi svg { color: var(--dt-muted-strong); }
  .mi.danger { color: var(--dt-danger); }
  .mi.danger svg { color: var(--dt-danger); }
  .div { height: 1px; background: var(--dt-divider); margin: 5px 0; }
  .lab { font-size: 11px; color: var(--dt-muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="stack">
  <div>
    <div class="lab">Breadcrumb</div>
    <nav class="crumb">
      <a>콘솔</a><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <a>정부 API</a><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <b>기상청 단기예보</b>
    </nav>
  </div>
  <div>
    <div class="lab">Tabs</div>
    <div class="tabs">
      <span class="tab on">도구<span class="c">42</span></span>
      <span class="tab">실행 로그</span>
      <span class="tab">API 키</span>
      <span class="tab">설정</span>
    </div>
  </div>
  <div>
    <div class="lab">Menu</div>
    <div class="menu">
      <div class="mi hov"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>도구 추가</div>
      <div class="mi"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10" stroke-linecap="round"/></svg>실행 로그 보기</div>
      <div class="div"></div>
      <div class="mi danger"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M8 7l1 12h6l1-12" stroke-linecap="round" stroke-linejoin="round"/></svg>연동 해제</div>
    </div>
  </div>
</div>
</body>
</html>
