<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --paper: #fbfaf8; --surface: #fff; --sunken: #f4f3ef;
    --ink: #1b1a16; --ink-strong: #0c0b08; --muted: #79766e; --muted-strong: #423f38;
    --border: #eceae3; --border-strong: #ddd9cf;
    --accent: #ec5e1f; --accent-strong: #ec5e1f; --accent-soft: rgba(236,94,31,0.10);
    --success: #1f9d57; --danger: #dc3a34;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', sans-serif;
    font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .wrap { padding: 16px; }
  h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 2px; color: var(--ink-strong); }
  h1 .dot { color: var(--accent); }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
  .field { display: grid; gap: 6px; margin-bottom: 14px; }
  label { font-size: 12px; font-weight: 600; color: var(--muted-strong); }
  input[type="text"] {
    width: 100%; height: 34px; padding: 0 11px; border: none; background: var(--sunken);
    border-radius: 4px; font-size: 12px; font-family: var(--mono); color: var(--ink-strong); outline: none;
  }
  input[type="text"]:focus { background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }
  .opts { display: grid; gap: 9px; margin-bottom: 16px; }
  .opt { display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
  .opt input { margin-top: 2px; accent-color: var(--accent); }
  .opt .t { font-size: 12.5px; }
  .opt .d { font-size: 11px; color: var(--muted); margin-top: 1px; }
  button.run {
    width: 100%; height: 40px; border: none; border-radius: 4px; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    transition: background-color 130ms;
  }
  button.run:hover { background: var(--accent-strong); }
  button.run:disabled { opacity: 0.55; cursor: not-allowed; }
  .log {
    margin-top: 14px; max-height: 180px; overflow-y: auto; padding: 10px 11px;
    background: #14161d; border-radius: 6px; font-family: var(--mono); font-size: 11px;
    line-height: 1.7; color: #cdd0d8; white-space: pre-wrap; display: none;
  }
  .log.show { display: block; }
  .log .ok { color: #34d399; }
  .log .err { color: #f87171; }
  .log .dim { color: #5a6273; }
  .row { display: flex; gap: 8px; }
  .row .field { flex: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Bridger Design System<span class="dot">.</span></h1>
  <p class="sub">GitHub 공개 레포에서 토큰 + 40개 컴포넌트를 Figma로 동기화</p>

  <div class="field">
    <label for="repo">GitHub repo (owner/name)</label>
    <input id="repo" type="text" value="bridger-kr/bridger-design-system" />
  </div>
  <div class="field">
    <label for="branch">Branch</label>
    <input id="branch" type="text" value="main" />
  </div>

  <div class="opts">
    <label class="opt">
      <input type="checkbox" id="doVars" checked />
      <span><span class="t">Variables &amp; Styles</span><span class="d">색·간격·radius Variables + 타이포/그림자 Styles (Light/Dark 모드)</span></span>
    </label>
    <label class="opt">
      <input type="checkbox" id="doComponents" checked />
      <span><span class="t">컴포넌트 40종</span><span class="d">Button·Badge·Card·Table 등 Component Set(Variants) 생성</span></span>
    </label>
  </div>

  <button class="run" id="run">동기화 실행</button>
  <div class="log" id="log"></div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const logEl = $('log');
  function log(msg, cls) {
    logEl.classList.add('show');
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = msg + '\n';
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function fetchJson(url, label) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(label + ' HTTP ' + res.status);
    return await res.json();
  }

  $('run').onclick = async () => {
    const repo = $('repo').value.trim();
    const branch = $('branch').value.trim() || 'main';
    const doVars = $('doVars').checked;
    const doComponents = $('doComponents').checked;
    if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repo)) { log('repo 형식: owner/name', 'err'); return; }
    if (!doVars && !doComponents) { log('최소 하나는 선택하세요.', 'err'); return; }

    $('run').disabled = true;
    logEl.innerHTML = '';
    const base = `https://raw.githubusercontent.com/${repo}/${branch}/packages/figma-plugin`;

    try {
      let tokens = null, spec = null;
      if (doVars) {
        log('토큰 다운로드…', 'dim');
        tokens = await fetchJson(`${base}/bridger-tokens.tokens.json`, '토큰 다운로드 실패');
        log('✓ 토큰 로드', 'ok');
      }
      if (doComponents) {
        log('컴포넌트 스펙 다운로드…', 'dim');
        spec = await fetchJson(`${base}/components.spec.json`, '컴포넌트 스펙 다운로드 실패');
        log(`✓ 스펙 로드 (${spec.components.length}종)`, 'ok');
        // tokens are needed to resolve variable bindings during component build
        if (!tokens) {
          tokens = await fetchJson(`${base}/bridger-tokens.tokens.json`, '토큰 다운로드 실패');
        }
      }
      parent.postMessage({ pluginMessage: { type: 'sync', tokens, spec, doVars, doComponents } }, '*');
    } catch (e) {
      log('다운로드 실패: ' + e.message, 'err');
      log('레포가 공개인지, branch/경로가 맞는지 확인하세요.', 'dim');
      $('run').disabled = false;
    }
  };

  onmessage = (e) => {
    const m = e.data.pluginMessage;
    if (!m) return;
    if (m.type === 'log') log(m.msg, m.cls);
    if (m.type === 'done') { log('\n완료.', 'ok'); $('run').disabled = false; }
    if (m.type === 'error') { log('오류: ' + m.msg, 'err'); $('run').disabled = false; }
  };
</script>
</body>
</html>
