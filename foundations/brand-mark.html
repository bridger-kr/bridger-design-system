<!-- @dsCard group="Brand" viewport="700x190" name="Mark detail" subtitle="The persimmon period is the whole mark — restraint over a literal bridge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--dt-paper); padding: 26px; display: flex; align-items: center; gap: 34px; }
  .lockup { display: grid; gap: 12px; justify-items: start; }
  .wm { font-family: var(--dt-font-sans); font-weight: 780; letter-spacing: -0.025em; color: var(--dt-ink-strong); line-height: 1; }
  .wm .dot { color: var(--dt-accent); }
  .note { color: var(--dt-muted-strong); font-size: 13px; line-height: 1.6; max-width: 320px; }
  .note b { color: var(--dt-ink-strong); font-weight: 600; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="lockup">
    <span class="wm" style="font-size:44px">Bridger<span class="dot">.</span></span>
    <span class="wm" style="font-size:24px">Bridger<span class="dot">.</span></span>
    <span class="wm" style="font-size:16px">Bridger<span class="dot">.</span></span>
  </div>
  <div class="note">
    <b>브릿저 — Bridger.</b> The mark is the wordmark plus a single persimmon period — the one place the brand color touches the logotype. No literal bridge glyph; the restraint reads as a confident product, not an illustration.
  </div>
</body>
</html>
