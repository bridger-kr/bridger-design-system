<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="Bridger. — mark-only, persimmon period. On light and dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .panel { display: flex; align-items: center; justify-content: center; height: 180px; background: var(--dt-paper); }
  .light { background: var(--dt-paper); }
  .wm { font-family: var(--dt-font-sans); font-weight: 780; font-size: 38px; letter-spacing: -0.025em; color: var(--dt-ink-strong); line-height: 1; }
  .wm .dot { color: var(--dt-accent); }
</style>
</head>
<body>
  <div class="panel light"><span class="wm">Bridger<span class="dot">.</span></span></div>
  <div class="panel dark"><span class="wm">Bridger<span class="dot">.</span></span></div>
</body>
</html>
